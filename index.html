
<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Clock-in Location Checker</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 2em;
      text-align: center;
    }
    #status {
      font-size: 1.2em;
      margin-bottom: 1em;
    }
    button {
      padding: 1em 2em;
      font-size: 1.1em;
      border: none;
      border-radius: 8px;
      background-color: #00aa00;
      color: white;
      cursor: pointer;
      display: none;
    }
  </style>
</head>
<body>
  <h2>📍 ตรวจสอบตำแหน่งก่อน Clock-in</h2>
  <div id="status">กำลังตรวจสอบตำแหน่งของคุณ...</div>
  <button id="clockinBtn">✅ Clock-in เลย!</button>

  <script>
    const offices = [
      { name: "เมกาบางนา", lat: 13.6475697, lng: 100.6798112 },
      { name: "สุขาภิบาล 3", lat: 13.7893984, lng: 100.6782873 }
    ];

    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    function checkProximity(lat, lng) {
      for (const office of offices) {
        const distance = haversine(lat, lng, office.lat, office.lng);
        if (distance <= 1.0) {
          return office.name;
        }
      }
      return null;
    }

    function showStatus(message) {
      document.getElementById("status").textContent = message;
    }

    navigator.geolocation.getCurrentPosition(pos => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const nearOffice = checkProximity(lat, lng);
      if (nearOffice) {
        showStatus("✅ คุณอยู่ในสาขา: " + nearOffice);
        document.getElementById("clockinBtn").style.display = "inline-block";
      } else {
        showStatus("❌ คุณอยู่นอกพื้นที่ ไม่สามารถ Clock-in ได้");
      }
    }, err => {
      showStatus("❗ ไม่สามารถเข้าถึงตำแหน่งของคุณได้");
    });
  </script>
</body>
</html>
